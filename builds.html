<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Builds</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Arial;
}

.page { padding: 28px; }

.header {
  max-width:1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
}

.brand {
  font-size: 32px;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 0.5px;
}

.brand span { color: var(--accent); }

.ecosystem-nav {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}

.nav-btn:hover {
  color: var(--text);
  border-color: rgba(122,162,255,0.25);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
}

.subtitle {
  margin: 0;
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

input {
  width:100%;
  display:block;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline:none;
  margin-top:14px;
}

#app {
  max-width:1100px;
  margin: 0 auto;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:14px;
}

.build-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  transition:0.25s;
}

.build-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 18px 55px rgba(0,0,0,0.55);
  border-color: rgba(122,162,255,0.25);
}

.preview {
  aspect-ratio:16/9;
  background:#0b0f14;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:2px;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#0b0f14;
}

.build-body {
  padding:14px;
}

.build-body h2 {
  margin:0 0 8px 0;
  font-size:18px;
}

.build-body p {
  margin:0;
  font-size:13px;
  color: var(--muted);
  line-height:1.5;
}

.meta {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin:14px 0;
}

.meta div {
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  color:var(--muted);
}

.meta strong {
  color:var(--text);
}

.button {
  display:inline-block;
  padding:9px 12px;
  border-radius:10px;
  border:1px solid rgba(122,162,255,0.25);
  background:rgba(122,162,255,0.12);
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  font-weight:700;
}

.button:hover {
  background:rgba(122,162,255,0.18);
}

.empty,
.error {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  color: var(--muted);
  font-size:13px;
  line-height:1.5;
}

.error {
  color:#ffb4b4;
  border-color:rgba(255,100,100,0.25);
}

@media (max-width: 720px) {
  .page {
    padding: 20px;
  }

  .brand-row {
    flex-direction:column;
    align-items:flex-start;
  }

  .ecosystem-nav {
    justify-content:flex-start;
  }

  .brand {
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="header">

    <div class="brand-row">

      <div class="brand" id="brand"><span>Media</span> Tiles</div>

      <div class="ecosystem-nav">
        <a class="nav-btn" href="./index.html">Home</a>
        <a class="nav-btn" href="./browse.html">Library</a>
        <a class="nav-btn active" href="./builds.html">Builds</a>
        <a class="nav-btn" href="https://guyititian.github.io/media-lab/">Tools</a>
      </div>

    </div>

    <p class="subtitle">
      Browse Nuvio-ready collection packs with artwork previews, setup notes, and downloadable JSON files.
    </p>

    <input id="search" placeholder="Search builds..." />

  </div>

  <div id="app">Loading...</div>

</div>

<script>
let builds = [];

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function pathFor(slug, file) {
  return `./builds/${encodeURIComponent(slug)}/${file}`;
}

function text(value, fallback = "") {
  return value === undefined || value === null || value === "" ? fallback : String(value);
}

function collectionsFrom(nuvio) {
  return Array.isArray(nuvio) ? nuvio : [];
}

function foldersFrom(nuvio) {
  return collectionsFrom(nuvio).flatMap(collection => Array.isArray(collection.folders) ? collection.folders : []);
}

function statsFrom(nuvio) {
  const collections = collectionsFrom(nuvio);
  const folders = foldersFrom(nuvio);
  const sources = folders.flatMap(folder => Array.isArray(folder.catalogSources) ? folder.catalogSources : []);

  return {
    collections: collections.length,
    folders: folders.length,
    sources: sources.length
  };
}

function previewImagesFrom(nuvio) {
  const images = [];

  for (const folder of foldersFrom(nuvio)) {
    if (folder.coverImageUrl && !images.includes(folder.coverImageUrl)) {
      images.push(folder.coverImageUrl);
    }

    if (images.length >= 4) break;
  }

  return images;
}

function render() {
  const query = document.getElementById("search").value.toLowerCase();
  const app = document.getElementById("app");

  const visible = builds.filter(build => {
    const haystack = [
      build.title,
      build.creator,
      build.status,
      build.category,
      build.description,
      ...(build.tags || [])
    ].join(" ").toLowerCase();

    return !query || haystack.includes(query);
  });

  if (!visible.length) {
    app.innerHTML = `<div class="empty">No builds found.</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  visible.forEach(build => {
    const stats = build.stats || {};
    const images = build.previewImages || [];

    const imageHtml = images.length
      ? images.map(src => `<img src="${src}" alt="" loading="lazy" onerror="this.style.display='none'">`).join("")
      : `<div style="grid-column:1/-1;display:grid;place-items:center;color:rgba(232,238,247,0.35);font-size:13px;">No preview</div>`;

    const card = document.createElement("article");
    card.className = "build-card";

    card.innerHTML = `
      <div class="preview">${imageHtml}</div>

      <div class="build-body">
        <h2>${text(build.title, "Untitled Build")}</h2>
        <p>${text(build.description, "No description provided.")}</p>

        <div class="meta">
          <div>Collections: <strong>${stats.collections ?? "—"}</strong></div>
          <div>Folders: <strong>${stats.folders ?? "—"}</strong></div>
          <div>Sources: <strong>${stats.sources ?? "—"}</strong></div>
          <div>Status: <strong>${text(build.status, "Community")}</strong></div>
        </div>

        <a class="button" href="./build.html?slug=${encodeURIComponent(build.slug)}">View Build</a>
      </div>
    `;

    grid.appendChild(card);
  });

  app.innerHTML = "";
  app.appendChild(grid);
}

async function load() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  try {
    const indexResponse = await fetch("./builds/index.json", { cache: "no-store" });
    if (!indexResponse.ok) throw new Error("Could not load builds/index.json");

    const index = await indexResponse.json();

    builds = await Promise.all(index.map(async item => {
      const buildResponse = await fetch(pathFor(item.slug, "build.json"), { cache: "no-store" });
      if (!buildResponse.ok) throw new Error(`Could not load build.json for ${item.slug}`);

      const build = await buildResponse.json();

      let nuvio = [];
      const nuvioResponse = await fetch(pathFor(item.slug, build.nuvioJson || "nuvio-collections.json"), { cache: "no-store" });
      if (nuvioResponse.ok) {
        nuvio = await nuvioResponse.json();
      }

      return {
        ...build,
        featured: Boolean(item.featured),
        stats: statsFrom(nuvio),
        previewImages: previewImagesFrom(nuvio)
      };
    }));

    builds.sort((a, b) => Number(b.featured) - Number(a.featured) || text(a.title).localeCompare(text(b.title)));
    render();

  } catch (error) {
    console.error(error);
    app.innerHTML = `
      <div class="error">
        Could not load builds. Check that <strong>builds/index.json</strong> exists and that each listed build folder contains <strong>build.json</strong> and <strong>nuvio-collections.json</strong>.
      </div>
    `;
  }
}

document.getElementById("search").addEventListener("input", render);

load();
</script>

</body>
</html>
