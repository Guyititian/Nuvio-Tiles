<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Builds | Media Tiles</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  background: radial-gradient(1200px 800px at 50% 20%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Arial;
}

.wrapper {
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:40px;
}

.shell {
  width:100%;
  max-width:1100px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 42px;
  box-shadow: var(--shadow);
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:28px;
}

.logo {
  font-size:22px;
  font-weight:900;
  letter-spacing:0.5px;
  color:var(--text);
  text-decoration:none;
  cursor:pointer;
}

.logo span {
  color:var(--accent);
}

.nav {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.nav a {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  transition:0.2s;
}

.nav a:hover {
  transform: translateY(-2px);
  color: var(--text);
  border-color: rgba(122,162,255,0.25);
}

.nav a.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

.brand {
  text-align:center;
  margin-bottom: 28px;
}

.brand h1 {
  font-size: 42px;
  letter-spacing: 1px;
  margin: 0;
  font-weight: 700;
}

.brand h1 span {
  color: var(--accent);
}

.brand p {
  margin-top: 10px;
  font-size: 14px;
  color: var(--muted);
}

.divider {
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  margin: 28px 0;
}

.controls {
  margin-bottom:24px;
}

.search {
  width:100%;
  max-width:520px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text);
  font-size:14px;
  outline:none;
}

.search::placeholder {
  color:rgba(232,238,247,0.35);
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap:22px;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow:hidden;
  transition: all 0.25s ease;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(122,162,255,0.25);
  box-shadow: 0 18px 50px rgba(0,0,0,0.6);
}

.preview {
  aspect-ratio:16/9;
  background:#0b0f14;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:2px;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#0b0f14;
}

.card-body {
  padding:18px;
}

.card h2 {
  margin:0 0 8px 0;
  font-size:18px;
}

.card p {
  margin:0;
  font-size:13px;
  color: var(--muted);
  line-height:1.5;
}

.meta {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin:16px 0;
}

.meta div {
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  color:var(--muted);
}

.meta strong {
  color:var(--text);
}

.button {
  display:inline-block;
  padding:10px 13px;
  border-radius:10px;
  border:1px solid rgba(122,162,255,0.25);
  background:rgba(122,162,255,0.12);
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  font-weight:700;
}

.button:hover {
  background:rgba(122,162,255,0.18);
}

.empty,
.error {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  color: var(--muted);
  font-size:13px;
  line-height:1.5;
}

.error {
  color:#ffb4b4;
  border-color:rgba(255,100,100,0.25);
}

.footer {
  margin-top: 36px;
  text-align:center;
  font-size:12px;
  color: rgba(255,255,255,0.35);
}

@media (max-width: 760px) {
  .wrapper {
    padding:22px;
  }

  .shell {
    padding:32px 22px;
  }

  .topbar {
    flex-direction:column;
    align-items:flex-start;
  }

  .nav {
    justify-content:flex-start;
  }

  .brand h1 {
    font-size:34px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="shell">

    <div class="topbar">
      <a class="logo" href="./index.html"><span>Media</span> Tiles</a>

      <div class="nav">
        <a href="./browse.html">Library</a>
        <a class="active" href="./builds.html">Builds</a>
        <a href="https://guyititian.github.io/media-lab/">Tools</a>
      </div>
    </div>

    <div class="brand">
      <h1><span>Media</span> Builds</h1>
      <p>Nuvio-ready collection packs with artwork previews, setup notes, and downloadable JSON files</p>
    </div>

    <div class="divider"></div>

    <div class="controls">
      <input id="searchInput" class="search" type="search" placeholder="Search builds..." />
    </div>

    <div id="grid" class="grid">
      <div class="empty">Loading builds...</div>
    </div>

    <div class="footer">
      Media Tiles • Library • Builds • Tools
    </div>

  </div>
</div>

<script>
const grid = document.getElementById("grid");
const searchInput = document.getElementById("searchInput");

let builds = [];

function pathFor(slug, file) {
  return `./builds/${encodeURIComponent(slug)}/${file}`;
}

function text(value, fallback = "") {
  return value === undefined || value === null || value === "" ? fallback : String(value);
}

function collectionsFrom(nuvio) {
  return Array.isArray(nuvio) ? nuvio : [];
}

function foldersFrom(nuvio) {
  return collectionsFrom(nuvio).flatMap(collection => Array.isArray(collection.folders) ? collection.folders : []);
}

function statsFrom(nuvio) {
  const collections = collectionsFrom(nuvio);
  const folders = foldersFrom(nuvio);
  const sources = folders.flatMap(folder => Array.isArray(folder.catalogSources) ? folder.catalogSources : []);

  return {
    collections: collections.length,
    folders: folders.length,
    sources: sources.length
  };
}

function previewImagesFrom(nuvio) {
  const images = [];

  for (const folder of foldersFrom(nuvio)) {
    if (folder.coverImageUrl && !images.includes(folder.coverImageUrl)) {
      images.push(folder.coverImageUrl);
    }

    if (images.length >= 4) break;
  }

  return images;
}

function render() {
  const query = searchInput.value.trim().toLowerCase();

  const visible = builds.filter(build => {
    const haystack = [
      build.title,
      build.creator,
      build.status,
      build.category,
      build.description,
      ...(build.tags || [])
    ].join(" ").toLowerCase();

    return !query || haystack.includes(query);
  });

  if (!visible.length) {
    grid.innerHTML = `<div class="empty">No builds found.</div>`;
    return;
  }

  grid.innerHTML = visible.map(build => {
    const stats = build.stats || {};
    const images = build.previewImages || [];

    const imageHtml = images.length
      ? images.map(src => `<img src="${src}" alt="" loading="lazy" onerror="this.style.display='none'">`).join("")
      : `<div style="grid-column:1/-1;display:grid;place-items:center;color:rgba(232,238,247,0.35);font-size:13px;">No preview</div>`;

    return `
      <article class="card">
        <div class="preview">${imageHtml}</div>

        <div class="card-body">
          <h2>${text(build.title, "Untitled Build")}</h2>
          <p>${text(build.description, "No description provided.")}</p>

          <div class="meta">
            <div>Collections: <strong>${stats.collections ?? "—"}</strong></div>
            <div>Folders: <strong>${stats.folders ?? "—"}</strong></div>
            <div>Sources: <strong>${stats.sources ?? "—"}</strong></div>
            <div>Status: <strong>${text(build.status, "Community")}</strong></div>
          </div>

          <a class="button" href="./build.html?slug=${encodeURIComponent(build.slug)}">View Build</a>
        </div>
      </article>
    `;
  }).join("");
}

async function load() {
  try {
    const indexResponse = await fetch("./builds/index.json", { cache: "no-store" });
    if (!indexResponse.ok) throw new Error("Could not load builds/index.json");

    const index = await indexResponse.json();

    builds = await Promise.all(index.map(async item => {
      const buildResponse = await fetch(pathFor(item.slug, "build.json"), { cache: "no-store" });
      if (!buildResponse.ok) throw new Error(`Could not load build.json for ${item.slug}`);

      const build = await buildResponse.json();

      let nuvio = [];
      const nuvioResponse = await fetch(pathFor(item.slug, build.nuvioJson || "nuvio-collections.json"), { cache: "no-store" });
      if (nuvioResponse.ok) {
        nuvio = await nuvioResponse.json();
      }

      return {
        ...build,
        featured: Boolean(item.featured),
        stats: statsFrom(nuvio),
        previewImages: previewImagesFrom(nuvio)
      };
    }));

    builds.sort((a, b) => Number(b.featured) - Number(a.featured) || text(a.title).localeCompare(text(b.title)));
    render();

  } catch (error) {
    console.error(error);
    grid.innerHTML = `
      <div class="error">
        Could not load builds. Check that <strong>builds/index.json</strong> exists and that each listed build folder contains <strong>build.json</strong> and <strong>nuvio-collections.json</strong>.
      </div>
    `;
  }
}

searchInput.addEventListener("input", render);
load();
</script>

</body>
</html>
