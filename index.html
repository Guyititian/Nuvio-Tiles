<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Tiles</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 60%, #000 100%);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 70px 20px;
      text-align: center;
    }

    h1 {
      font-size: 46px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .cta {
      display: inline-block;
      padding: 14px 30px;
      background: linear-gradient(135deg, #ffffff, #cfcfcf);
      color: black;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 30px;
      text-align: left;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px;
      border-radius: 14px;
      transition: 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .card h3 {
      margin: 0 0 8px;
      text-transform: capitalize;
      font-size: 18px;
    }

    .card p {
      font-size: 13px;
      margin: 0;
      opacity: 0.6;
    }

    a.card-link {
      text-decoration: none;
      color: inherit;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Media Tiles</h1>
  <p>A structured visual library for franchises, genres, decades, and collections.</p>

  <!-- ALL CONTENT ENTRY -->
  <a class="cta" href="browse.html">Enter Full Library</a>

  <div id="grid" class="grid"></div>

  <div class="footer">
    Media Tiles • Hosted on GitHub Pages
  </div>

</div>

<script src="assets.js"></script>

<script>
function pretty(name) {
  return name.replace(/-/g, " ");
}

function render() {
  const grid = document.getElementById("grid");

  // ALL VIEW
  const all = {
    label: "All Content",
    desc: "Browse everything across all categories.",
    link: "browse.html"
  };

  const items = [
    all,
    ...categories.map(c => ({
      label: c,
      desc: `Browse ${pretty(c)} collection.`,
      link: `browse.html?category=${c}`
    }))
  ];

  items.forEach(item => {
    const a = document.createElement("a");
    a.href = item.link;
    a.className = "card-link";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${pretty(item.label)}</h3>
      <p>${item.desc}</p>
    `;

    a.appendChild(card);
    grid.appendChild(a);
  });
}

render();
</script>

</body>
</html>
