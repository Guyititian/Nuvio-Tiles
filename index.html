<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b 70%);
  color:white;
  font-family:Arial;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:60px auto;
  padding:20px;
}

/* BRAND */
h1 {
  font-size:64px;
  margin-bottom:10px;
  letter-spacing:2px;
  text-align:left;

  color:white;
  text-shadow:
    0 0 10px rgba(255,255,255,0.2),
    0 0 30px rgba(255,255,255,0.15);
}

.sub {
  opacity:0.6;
  margin-bottom:40px;
  font-size:16px;
}

/* CARDS */
.cards {
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

/* CARD */
.card {
  background:#151515;
  padding:30px;
  border-radius:18px;
  width:320px;
  cursor:pointer;
  text-align:left;

  border:1px solid rgba(255,255,255,0.06);

  transition: all 0.25s ease;
}

/* DEPTH + GLOW */
.card:hover {
  transform:translateY(-8px) scale(1.02);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    0 0 20px rgba(255,255,255,0.15);

  border-color: rgba(255,255,255,0.2);
}

/* TITLE */
.card h2 {
  margin:0 0 14px 0;
  font-size:22px;
}

/* TEXT */
.card p {
  font-size:15px;
  opacity:0.75;
  line-height:1.5;
}

/* FOOTER */
.footer {
  margin-top:60px;
  font-size:12px;
  opacity:0.4;
}
</style>
</head>

<body>

<div class="container">

  <h1>MEDIA TILES</h1>
  <div class="sub">Ecosystem Portal</div>

  <div class="cards">

    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>📚 Library</h2>
      <p>Browse curated media tiles and copy direct asset links.</p>
    </div>

    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>🛠 Tools</h2>
      <p>Bring your own media, process it, and generate outputs.</p>
    </div>

  </div>

  <div class="footer">
    Media-Tiles Ecosystem • Library + Tools
  </div>

</div>

</body>
</html>
