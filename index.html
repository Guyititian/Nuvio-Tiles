<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Tiles</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 20px;
    }

    h1 { margin-bottom: 20px; }

    h2 {
      margin-top: 40px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .tile {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .tile img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      margin-top: 6px;
      width: 100%;
      padding: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Media Tiles</h1>

<div id="app"></div>

<script>
const baseURL = "https://guyititian.github.io/media-tiles/";

const structure = {
  genres: [
    "horror.jpeg",
    "sci-fi.jpeg"
  ],
  franchises: [
    "avatar-collection.png",
    "scream-collection.png"
  ],
  decades: [
    "80s.jpeg",
    "90s.jpeg"
  ],
  networks: [],
  people: [],
  studios: [],
  special: []
};

function build() {
  const app = document.getElementById("app");

  for (const category in structure) {
    const items = structure[category];

    const section = document.createElement("div");

    const title = document.createElement("h2");
    title.textContent = category.toUpperCase();
    section.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(file => {
      const url = `${baseURL}collections/${category}/${file}`;

      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${url}" onclick="copy('${url}')" />
        <div>${file.replace('.jpeg','')}</div>
        <button onclick="copy('${url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(grid);
    app.appendChild(section);
  }
}

function copy(text) {
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

build();
</script>

</body>
</html>
