<!DOCTYPE html>
<html>
<head>
  <title>Media Tiles Test</title>
  <style>
    body { background:#111; color:white; font-family:Arial; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,150px); gap:10px; }
    .tile { background:#222; padding:10px; border-radius:8px; }
    img { width:100%; border-radius:6px; }
  </style>
</head>
<body>

<h1>Media Tiles Working Test</h1>

<div class="grid">

  <div class="tile">
    <img src="collections/genres/horror.jpeg">
    <div>horror</div>
  </div>

  <div class="tile">
    <img src="collections/franchises/scream-collection.png">
    <div>scream</div>
  </div>

  <div class="tile">
    <img src="collections/decades/90s.jpeg">
    <div>90s</div>
  </div>

</div>

</body>
</html>
