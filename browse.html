<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
body {
  margin:0;
  background:#070707;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header {
  position:sticky;
  top:0;

  padding:18px 22px;

  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(16px);

  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* =========================
   BRAND (NOW A REAL ANCHOR OBJECT)
========================= */
#brand {
  font-size:32px;
  font-weight:600;

  display:inline-block;

  padding:10px 18px;
  border-radius:14px;

  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);

  box-shadow:
    0 15px 50px rgba(0,0,0,0.7),
    0 0 25px rgba(255,255,255,0.10);

  cursor:pointer;
}

/* CONTEXT */
#contextTitle {
  font-size:12px;
  opacity:0.6;
  margin-top:6px;
}

/* =========================
   TABS (SECONDARY)
========================= */
.tabs {
  display:flex;
  gap:10px;
  margin-top:14px;
  flex-wrap:wrap;
}

.tab {
  padding:10px 14px;
  border-radius:10px;

  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);

  font-size:13px;
  opacity:0.7;

  cursor:pointer;

  transition:0.2s;
}

.tab.active {
  background: rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.2);

  box-shadow: 0 0 25px rgba(255,255,255,0.10);

  transform: translateY(-2px);

  opacity:1;
}

/* SEARCH */
input {
  width:calc(100% - 44px);
  margin:18px 22px;

  padding:14px;

  border-radius:12px;

  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);

  color:white;

  box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
}

/* CONTENT */
section {
  padding:0 22px 40px;
}

h2 {
  font-size:14px;
  opacity:0.7;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}

/* TILE */
.tile {
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);

  border-radius:12px;

  padding:10px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.55);

  transition:0.2s;
}

.tile:hover {
  transform:translateY(-4px);
  box-shadow:0 25px 70px rgba(0,0,0,0.85);
}

.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
}

.tile-title {
  margin-top:6px;
  font-size:13px;
  opacity:0.75;
}

.tile button {
  margin-top:8px;
  width:100%;
  padding:6px;

  border-radius:8px;
  border:none;

  background: rgba(255,255,255,0.06);
  color:white;

  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div id="brand">Media Tiles</div>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app"></div>

<script src="assets.js"></script>

<script>
let allItems=[];
let currentCategory="all";

const params=new URLSearchParams(location.search);
currentCategory=params.get("category")||"all";

document.getElementById("brand").onclick=()=>{
  window.location.href="index.html";
};

function updateHeader(){
  document.getElementById("contextTitle").textContent=
    currentCategory==="all"?"Library":currentCategory;
}

function buildTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  const list=["all",...categories];

  list.forEach(c=>{
    const d=document.createElement("div");
    d.className="tab";

    if(c===currentCategory)d.classList.add("active");

    d.textContent=c;

    d.onclick=()=>{
      currentCategory=c;
      location.href=c==="all"?"browse.html":`browse.html?category=${c}`;
    };

    tabs.appendChild(d);
  });
}

async function load(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const list=currentCategory==="all"?categories:[currentCategory];

  for(const c of list){
    const items=await fetchCategory(c);

    const section=document.createElement("section");

    const h=document.createElement("h2");
    h.textContent=c;

    const grid=document.createElement("div");
    grid.className="grid";

    items.forEach(i=>{
      const t=document.createElement("div");
      t.className="tile";

      t.innerHTML=`
        <img src="${i.url}">
        <div class="tile-title">${i.name}</div>
        <button onclick="navigator.clipboard.writeText('${i.url}')">Copy</button>
      `;

      grid.appendChild(t);
    });

    section.appendChild(h);
    section.appendChild(grid);
    app.appendChild(section);
  }
}

updateHeader();
buildTabs();
load();
</script>

</body>
</html>
