<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b 70%);
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  padding:20px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BRAND */
#brand {
  font-size:36px;
  margin:0;
  cursor:pointer;

  color:white;
  text-shadow:
    0 0 10px rgba(255,255,255,0.2),
    0 0 30px rgba(255,255,255,0.15);
}

/* CONTEXT */
#contextTitle {
  margin-top:6px;
  font-size:14px;
  opacity:0.6;
}

/* TABS WRAPPER (DEPTH) */
.tabs {
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;

  background:#111;
  padding:10px;
  border-radius:12px;
}

/* TAB */
.tab {
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  background:#1a1a1a;
  font-size:14px;

  transition: all 0.2s ease;
}

/* HOVER */
.tab:hover {
  background:#222;
}

/* ACTIVE (DEPTH + GLOW) */
.tab.active {
  background:#2a2a2a;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.15),
    0 0 12px rgba(255,255,255,0.2);
}

/* SEARCH */
input {
  width:calc(100% - 40px);
  margin:20px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

/* SECTIONS */
section {
  margin:30px 20px;
}

h2 {
  margin-bottom:12px;
  font-size:18px;
  opacity:0.9;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}

/* TILE */
.tile {
  background:#151515;
  padding:10px;
  border-radius:14px;
  display:flex;
  flex-direction:column;

  border:1px solid rgba(255,255,255,0.05);

  transition: all 0.25s ease;
}

/* DEPTH */
.tile:hover {
  transform: translateY(-5px) scale(1.02);

  box-shadow:
    0 15px 30px rgba(0,0,0,0.6),
    0 0 15px rgba(255,255,255,0.15);

  border-color: rgba(255,255,255,0.2);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
}

/* TITLE */
.tile-title {
  margin-top:8px;
  font-size:14px;
}

/* BUTTON */
.tile button {
  margin-top:auto;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ffffff;
  color:black;
  cursor:pointer;
  font-size:13px;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: white;
  color: black;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.25s ease;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">MEDIA TILES</h1>
  <div id="contextTitle">LIBRARY</div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>
<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied ✓");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.opacity = "1";
  toast.style.transform = "translateX(-50%) translateY(0px)";
  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(10px)";
  }, 1100);
}

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function updateHeader() {
  const context = document.getElementById("contextTitle");
  context.textContent =
    currentCategory === "all"
      ? "LIBRARY • ALL"
      : "LIBRARY • " + currentCategory.replace(/-/g, " ");
}

function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      updateTabs();
    };

    tabs.appendChild(div);
  });
}

function updateTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    const label = tab.textContent.toLowerCase().replace(/ /g, "-");

    if (
      (currentCategory === "all" && tab.textContent.toLowerCase() === "all") ||
      label === currentCategory
    ) {
      tab.classList.add("active");
    } else {
      tab.classList.remove("active");
    }
  });
}

async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");
  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = `${cat.replace(/-/g, " ")} (${items.length})`;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${item.url}" onclick="copy('${item.url}')"/>
        <div class="tile-title">${item.name}</div>
        <button onclick="copy('${item.url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);
  }

  app.innerHTML = "";
  app.appendChild(container);
}

document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  currentCategory = params.get("category") || "all";

  updateHeader();
  loadData();
  updateTabs();
});

updateHeader();
buildTabs();
loadData();
</script>

</body>
</html>
