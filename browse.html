<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a25 0%, #0d0d12 60%, #07070a 100%);
  color: white;
  font-family: Arial;
}

/* HEADER (BRAND ANCHOR) */
.header {
  position: sticky;
  top: 0;
  z-index: 50;

  padding: 14px 20px;

  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(10px);

  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* BRAND BUTTON (FIXED VISUAL WEIGHT) */
#brand {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;

  display: inline-block;

  padding: 6px 12px;
  border-radius: 10px;

  background: linear-gradient(145deg, #1e1e2e, #12121a);

  box-shadow:
    0 0 20px rgba(140,120,255,0.15),
    0 8px 20px rgba(0,0,0,0.5);
}

/* CONTEXT INDICATOR */
#contextTitle {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.7;
}

/* TABS (BIGGER + MORE DEPTH) */
.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.tab {
  padding: 10px 14px;
  border-radius: 10px;

  background: rgba(255,255,255,0.06);
  cursor: pointer;

  font-size: 14px;

  transition: 0.2s ease;
}

.tab:hover {
  background: rgba(255,255,255,0.12);
}

.tab.active {
  background: rgba(140,120,255,0.25);
  box-shadow: 0 0 20px rgba(140,120,255,0.25);
}

/* SEARCH (GLASS DEPTH) */
input {
  width: calc(100% - 40px);
  margin: 12px 20px;

  padding: 12px 14px;

  border-radius: 10px;
  border: none;

  background: rgba(255,255,255,0.06);
  color: white;

  backdrop-filter: blur(8px);

  outline: none;
}

/* CONTENT */
#app {
  padding: 20px;
}

/* SECTION HEADERS */
h2 {
  font-size: 15px;
  opacity: 0.85;
  margin: 20px 0 10px;
  border-left: 3px solid rgba(140,120,255,0.5);
  padding-left: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 14px;
}

/* TILE DEPTH RETURNED */
.tile {
  background: linear-gradient(145deg, #1a1a1a, #101010);
  border-radius: 12px;

  overflow: hidden;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.6);

  transition: 0.2s;
}

.tile:hover {
  transform: translateY(-4px);
  box-shadow:
    0 18px 45px rgba(0,0,0,0.7),
    0 0 18px rgba(140,120,255,0.18);
}

.tile img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  cursor: pointer;
}

.tile-title {
  padding: 8px;
  font-size: 13px;
  opacity: 0.9;
}

.tile button {
  width: 100%;
  padding: 8px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.06);
  color: white;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}
</style>
</head>

<body>

<div class="header">
  <div id="brand">Media Tiles</div>
  <div id="contextTitle"></div>

  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>
<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function copy(text) {
  navigator.clipboard.writeText(text);
  const toast = document.getElementById("toast");
  toast.style.opacity = 1;
  setTimeout(() => toast.style.opacity = 0, 1000);
}

function updateHeader() {
  document.getElementById("contextTitle").textContent =
    currentCategory === "all"
      ? "Library / All Collections"
      : "Library / " + currentCategory;
}

function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const list = ["all", ...categories];

  list.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat;

    div.onclick = () => {
      currentCategory = cat;
      history.pushState({}, "", cat === "all" ? "browse.html" : `browse.html?category=${cat}`);
      updateHeader();
      loadData();
      buildTabs();
    };

    tabs.appendChild(div);
  });
}

async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");

  const list = currentCategory === "all" ? categories : [currentCategory];

  allItems = [];

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);

    const section = document.createElement("div");

    const title = document.createElement("h2");
    title.textContent = cat;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${item.url}" onclick="copy('${item.url}')"/>
        <div class="tile-title">${item.name}</div>
        <button onclick="copy('${item.url}')">Copy</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);
  }

  app.innerHTML = "";
  app.appendChild(container);
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy</button>
    `;

    grid.appendChild(tile);
  });

  app.innerHTML = "";
  app.appendChild(grid);
});

updateHeader();
buildTabs();
loadData();
</script>

</body>
</html>
