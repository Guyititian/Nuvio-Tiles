<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  margin:20px;
}

/* =========================
   HEADER (UNCHANGED STYLE)
========================= */
.header {
  position: sticky;
  top: 0;
  background: #111;
  padding: 10px 0;
  z-index: 20;
  border-bottom: 1px solid #222;
}

#brand {
  margin: 0;
  font-size: 18px;
  cursor: pointer;
}

#contextTitle {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 4px;
}

/* =========================
   TABS (KEEP ORIGINAL STYLE)
========================= */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.tab {
  padding:8px 12px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
}

.tab.active {
  background:white;
  color:black;
  opacity:1;
}

/* =========================
   SEARCH (KEEP ORIGINAL + GOOD DEPTH YOU LIKED)
========================= */
input {
  width:100%;
  padding:10px;
  margin:10px 0 15px;

  border-radius:6px;
  border:none;

  background:#1a1a1a;
  color:white;

  box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
}

input:focus {
  outline:none;
  box-shadow: 0 0 0 1px rgba(120,140,255,0.4), 0 0 14px rgba(120,140,255,0.15);
}

/* =========================
   LAYOUT
========================= */
section {
  margin-bottom:40px;
  padding-bottom:10px;
  border-bottom:1px solid #1c1c1c;
}

h2 {
  margin:20px 0 10px;
  font-size:16px;
  opacity:0.85;
  border-left:3px solid #333;
  padding-left:8px;
}

/* GRID (unchanged density) */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

/* =========================
   🔧 TILE SYSTEM FIX ONLY
   (no theme changes, just hierarchy repair)
========================= */
.tile {
  background:#222;
  padding:10px;
  border-radius:10px;

  display:flex;
  flex-direction:column;

  height:100%;

  transition:0.15s;

  /* restores depth without changing aesthetic */
  box-shadow: 0 10px 24px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.06);
}

.tile:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.55);
  border-color: rgba(120,140,255,0.25);
}

/* IMAGE = clean window, no fake effects */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
  display:block;

  border: 1px solid rgba(255,255,255,0.06);
}

/* TITLE */
.tile-title {
  margin-top:8px;
  font-size:14px;
  opacity:0.85;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* BUTTON */
.tile button {
  margin-top:auto;
  width:100%;
  padding:6px;

  border-radius:6px;
  border:none;

  background:#2a2a2a;
  color:white;

  cursor:pointer;
}

.tile button:hover {
  background: rgba(120,140,255,0.2);
}

/* =========================
   TOAST (UNCHANGED)
========================= */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);

  background: white;
  color: black;

  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;

  opacity: 0;
  transition: all 0.25s ease;

  pointer-events: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">Media Tiles</h1>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied ✓");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;

  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 1100);
}

/* BRAND NAV */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER TEXT */
function updateHeader() {
  const context = document.getElementById("contextTitle");

  context.textContent =
    currentCategory === "all"
      ? "All Media Tiles"
      : currentCategory.replace(/-/g, " ") + " collection";
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      buildTabs();
    };

    tabs.appendChild(div);
  });
}

/* LOAD */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  const container = document.createElement("div");

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = `${cat.replace(/-/g, " ")} (${items.length})`;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${item.url}" onclick="copy('${item.url}')"/>
        <div class="tile-title">${item.name}</div>
        <button onclick="copy('${item.url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* INIT */
updateHeader();
buildTabs();
loadData();

</script>

</body>
</html>
