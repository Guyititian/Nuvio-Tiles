<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER = LAYERED SURFACE */
.header {
  position: sticky;
  top: 0;

  padding:14px 18px;

  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* BRAND = BIGGER + GLOW + CLICKABLE */
#brand {
  margin:0;
  font-size:20px;
  cursor:pointer;

  display:inline-block;

  text-shadow:
    0 0 20px rgba(255,255,255,0.25),
    0 0 40px rgba(255,255,255,0.10);
}

/* CONTEXT LABEL = CLEAR SECTION INDICATOR */
#contextTitle {
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
}

/* TABS = NOW HAVE DEPTH + ACTIVE STATE */
.tabs {
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* INACTIVE TAB */
.tab {
  padding:9px 14px;
  border-radius:10px;
  font-size:13px;

  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);

  cursor:pointer;

  transition: all 0.2s ease;

  opacity:0.7;
}

/* HOVER */
.tab:hover {
  transform: translateY(-2px);
  opacity:1;
}

/* ACTIVE TAB = LIFTED + GLOW */
.tab.active {
  background: rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 20px rgba(255,255,255,0.08);

  opacity:1;
}

/* SEARCH = NOW A FOCAL OBJECT */
input {
  width:calc(100% - 40px);
  margin:14px 20px;

  padding:12px 14px;

  border-radius:10px;

  border:1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.05);

  color:white;

  outline:none;

  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.4);
}

/* SECTIONS */
section {
  padding:0 20px 40px;
}

h2 {
  font-size:15px;
  opacity:0.8;
  margin:20px 0 10px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}

/* TILE = FLOATING OBJECT */
.tile {
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;

  padding:10px;

  transition:0.2s;

  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.tile:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.tile-title {
  margin-top:6px;
  font-size:13px;
  opacity:0.85;
}

/* BUTTON */
.tile button {
  margin-top:8px;
  width:100%;
  padding:6px;
  border-radius:8px;
  border:none;
  cursor:pointer;

  background: rgba(255,255,255,0.08);
  color:white;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  opacity: 0;
  transition: 0.25s;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="brand">Media Tiles</h1>
  <div id="contextTitle"></div>
  <div class="tabs" id="tabs"></div>
</div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.opacity = "1";

  setTimeout(() => t.style.opacity = "0", 900);
}

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function updateHeader() {
  document.getElementById("contextTitle").textContent =
    currentCategory === "all"
      ? "Library Overview"
      : currentCategory + " collection";
}

function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const list = ["all", ...categories];

  list.forEach(cat => {
    const t = document.createElement("div");
    t.className = "tab";

    if (cat === currentCategory) t.classList.add("active");

    t.textContent = cat;

    t.onclick = () => {
      currentCategory = cat;
      history.pushState({}, "", cat === "all" ? "browse.html" : `browse.html?category=${cat}`);
      updateHeader();
      load();
      buildTabs();
    };

    tabs.appendChild(t);
  });
}

async function load() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const list = currentCategory === "all" ? categories : [currentCategory];

  for (const cat of list) {
    const items = await fetchCategory(cat);

    const section = document.createElement("section");

    const h = document.createElement("h2");
    h.textContent = cat;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(i => {
      const d = document.createElement("div");
      d.className = "tile";

      d.innerHTML = `
        <img src="${i.url}" onclick="copy('${i.url}')"/>
        <div class="tile-title">${i.name}</div>
        <button onclick="copy('${i.url}')">Copy</button>
      `;

      grid.appendChild(d);
    });

    section.appendChild(h);
    section.appendChild(grid);
    app.appendChild(section);
  }
}

updateHeader();
buildTabs();
load();
</script>

</body>
</html>
