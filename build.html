<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Build</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Arial;
}

.page { padding: 28px; }

.header {
  max-width:1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
}

.brand {
  font-size: 32px;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 0.5px;
}

.brand span { color: var(--accent); }

.ecosystem-nav {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
  border-color: rgba(122,162,255,0.25);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

.section-title {
  text-align:center;
  margin: 28px 0 26px 0;
}

.section-title h1 {
  font-size: 42px;
  letter-spacing: 1px;
  margin: 0;
  font-weight: 800;
}

.section-title h1 span {
  color: var(--accent);
}

.section-title p {
  margin-top: 10px;
  font-size: 14px;
  color: var(--muted);
  line-height:1.5;
}

.divider {
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  margin: 28px 0;
}

.back {
  display:inline-block;
  color: var(--muted);
  text-decoration:none;
  font-size:13px;
  margin-top:2px;
}

.back:hover {
  color:var(--text);
}

#app {
  max-width:1100px;
  margin: 0 auto;
}

.hero {
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  box-shadow: var(--shadow);
  margin-bottom:18px;
}

.hero h1 {
  margin:0 0 8px 0;
  font-size:32px;
}

.hero p {
  margin:0;
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

.stats {
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:12px;
  margin-bottom:18px;
}

.stat {
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.stat span {
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-bottom:5px;
}

.stat strong {
  color:var(--text);
  font-size:22px;
}

.layout {
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:18px;
  align-items:start;
}

.panel {
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
}

.panel h2 {
  margin:0 0 14px 0;
  font-size:20px;
}

.panel p,
.panel li {
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.download {
  position:sticky;
  top:20px;
}

.button {
  display:block;
  padding:11px 13px;
  border-radius:10px;
  border:1px solid rgba(122,162,255,0.25);
  background:rgba(122,162,255,0.12);
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  font-weight:700;
  text-align:center;
  margin-top:10px;
}

.button:hover {
  background:rgba(122,162,255,0.18);
}

.module {
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:16px;
  background:rgba(0,0,0,0.14);
}

.module-header {
  padding:14px;
  border-bottom:1px solid var(--border);
}

.module-header h3 {
  margin:0 0 5px 0;
  font-size:17px;
}

.module-header p {
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.folder-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;
  padding:14px;
}

.folder {
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

.folder-img {
  aspect-ratio:16/9;
  background:#0b0f14;
}

.folder-img img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#0b0f14;
}

.folder-body {
  padding:10px;
}

.folder-body h4 {
  margin:0 0 5px 0;
  font-size:13px;
}

.folder-body p {
  margin:0;
  font-size:12px;
  color:var(--muted);
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,
td {
  text-align:left;
  border-bottom:1px solid var(--border);
  padding:8px;
  color:var(--muted);
  vertical-align:top;
}

th {
  color:var(--text);
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  word-break:break-word;
}

.empty,
.error {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  color: var(--muted);
  font-size:13px;
  line-height:1.5;
}

.error {
  color:#ffb4b4;
  border-color:rgba(255,100,100,0.25);
}

@media (max-width: 850px) {
  .layout {
    grid-template-columns:1fr;
  }

  .download {
    position:static;
  }

  .stats {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 720px) {
  .page {
    padding: 20px;
  }

  .brand-row {
    flex-direction:column;
    align-items:flex-start;
  }

  .ecosystem-nav {
    justify-content:flex-start;
  }

  .brand {
    font-size:28px;
  }

  .section-title h1 {
    font-size:34px;
  }
}

@media (max-width: 520px) {
  .stats {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="header">

    <div class="brand-row">

      <div class="brand" id="brand"><span>Media</span> Tiles</div>

      <div class="ecosystem-nav">
        <a class="nav-btn" href="./browse.html">Library</a>
        <a class="nav-btn active" href="./builds.html">Builds</a>
        <a class="nav-btn" href="https://guyititian.github.io/media-lab/">Tools</a>
      </div>

    </div>

    <div class="section-title">
      <h1><span>Media</span> Builds</h1>
      <p>Nuvio-ready collection packs with artwork previews, setup notes, and downloadable JSON files.</p>
    </div>

    <div class="divider"></div>

    <a class="back" href="./builds.html">← Back to Builds</a>

  </div>

  <div id="app">Loading...</div>

</div>

<script>
const app = document.getElementById("app");
const slug = new URLSearchParams(window.location.search).get("slug");

document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

function pathFor(file) {
  return `https://guyititian.github.io/media-tiles/builds/${encodeURIComponent(slug)}/${file}`;
}

function text(value, fallback = "") {
  return value === undefined || value === null || value === "" ? fallback : String(value);
}

function collectionsFrom(nuvio) {
  return Array.isArray(nuvio) ? nuvio : [];
}

function foldersFrom(nuvio) {
  return collectionsFrom(nuvio).flatMap(collection => Array.isArray(collection.folders) ? collection.folders : []);
}

function sourcesFrom(nuvio) {
  return foldersFrom(nuvio).flatMap(folder => Array.isArray(folder.catalogSources) ? folder.catalogSources : []);
}

function statsFrom(nuvio, aio) {
  const folders = foldersFrom(nuvio);

  return {
    collections: collectionsFrom(nuvio).length,
    folders: folders.length,
    sources: sourcesFrom(nuvio).length,
    artwork: folders.filter(folder => folder.coverImageUrl).length,
    focusGifs: folders.filter(folder => folder.focusGifEnabled && folder.focusGifUrl).length,
    aioCatalogs: Array.isArray(aio.catalogs) ? aio.catalogs.length : 0
  };
}

function summarizeCollection(collection) {
  const folders = Array.isArray(collection.folders) ? collection.folders : [];
  const sources = folders.flatMap(folder => Array.isArray(folder.catalogSources) ? folder.catalogSources : []);

  return {
    folders: folders.length,
    sources: sources.length
  };
}

function renderStats(stats) {
  return `
    <section class="stats">
      <div class="stat"><span>Collections</span><strong>${stats.collections}</strong></div>
      <div class="stat"><span>Folders</span><strong>${stats.folders}</strong></div>
      <div class="stat"><span>Sources</span><strong>${stats.sources}</strong></div>
      <div class="stat"><span>Artwork</span><strong>${stats.artwork}</strong></div>
      <div class="stat"><span>Focus GIFs</span><strong>${stats.focusGifs}</strong></div>
      <div class="stat"><span>AIO Catalogs</span><strong>${stats.aioCatalogs}</strong></div>
    </section>
  `;
}

function renderModules(nuvio) {
  const collections = collectionsFrom(nuvio);

  return `
    <section class="panel">
      <h2>Included Collections</h2>

      ${collections.map(collection => {
        const summary = summarizeCollection(collection);
        const folders = Array.isArray(collection.folders) ? collection.folders : [];

        return `
          <article class="module">
            <div class="module-header">
              <h3>${text(collection.title, "Untitled Collection")}</h3>
              <p>${summary.folders} folders • ${summary.sources} catalog sources</p>
            </div>

            <div class="folder-grid">
              ${folders.map(folder => {
                const sources = Array.isArray(folder.catalogSources) ? folder.catalogSources : [];

                return `
                  <article class="folder">
                    <div class="folder-img">
                      ${folder.coverImageUrl
                        ? `<img src="${folder.coverImageUrl}" alt="${text(folder.title)}" loading="lazy" onerror="this.style.display='none'">`
                        : ``
                      }
                    </div>
                    <div class="folder-body">
                      <h4>${text(folder.title, "Untitled Folder")}</h4>
                      <p>${sources.length} catalog source${sources.length === 1 ? "" : "s"}</p>
                    </div>
                  </article>
                `;
              }).join("")}
            </div>
          </article>
        `;
      }).join("")}
    </section>
  `;
}

function catalogRows(nuvio, limit = 50) {
  const rows = [];

  for (const collection of collectionsFrom(nuvio)) {
    const folders = Array.isArray(collection.folders) ? collection.folders : [];

    for (const folder of folders) {
      const sources = Array.isArray(folder.catalogSources) ? folder.catalogSources : [];

      for (const source of sources) {
        rows.push({
          collection: collection.title || "",
          folder: folder.title || "",
          type: source.type || "",
          addonId: source.addonId || "",
          catalogId: source.catalogId || ""
        });

        if (rows.length >= limit) return rows;
      }
    }
  }

  return rows;
}

function renderCatalogPreview(nuvio) {
  const rows = catalogRows(nuvio, 50);
  const total = sourcesFrom(nuvio).length;

  return `
    <section class="panel">
      <h2>Catalog Preview</h2>
      <p>Showing the first ${rows.length} of ${total} catalog source references.</p>

      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Collection</th>
              <th>Folder</th>
              <th>Type</th>
              <th>Addon</th>
              <th>Catalog ID</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>${text(row.collection)}</td>
                <td>${text(row.folder)}</td>
                <td>${text(row.type)}</td>
                <td class="mono">${text(row.addonId)}</td>
                <td class="mono">${text(row.catalogId)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function renderNotes(build) {
  const setup = Array.isArray(build.setupNotes) ? build.setupNotes : [];
  const issues = Array.isArray(build.knownIssues) ? build.knownIssues : [];

  return `
    <section class="panel">
      <h2>Setup Notes</h2>
      ${setup.length ? `<ul>${setup.map(note => `<li>${text(note)}</li>`).join("")}</ul>` : `<p>No setup notes provided.</p>`}
    </section>

    <section class="panel">
      <h2>Known Issues / Compatibility</h2>
      ${issues.length ? `<ul>${issues.map(issue => `<li>${text(issue)}</li>`).join("")}</ul>` : `<p>No known issues listed.</p>`}
    </section>
  `;
}

function renderDownloads(build) {
  const nuvioFile = build.nuvioJson || "nuvio-collections.json";
  const aioFile = build.aioJson || "aiometadata-catalogs.json";

  return `
    <aside class="panel download">
      <h2>Downloads</h2>
      <p>Download the files for this build.</p>
      <a class="button" href="${pathFor(nuvioFile)}" download>Download Nuvio JSON</a>
      <a class="button" href="${pathFor(aioFile)}" download>Download aiometadata JSON</a>
    </aside>
  `;
}

async function load() {
  if (!slug) {
    app.innerHTML = `<div class="error">No build selected. Return to <a href="./builds.html">Builds</a>.</div>`;
    return;
  }

  try {
    const buildResponse = await fetch(pathFor("build.json"), { cache: "no-store" });
    if (!buildResponse.ok) throw new Error("Could not load build.json");
    const build = await buildResponse.json();

    const nuvioResponse = await fetch(pathFor(build.nuvioJson || "nuvio-collections.json"), { cache: "no-store" });
    if (!nuvioResponse.ok) throw new Error("Could not load Nuvio JSON");
    const nuvio = await nuvioResponse.json();

    let aio = {};
    const aioResponse = await fetch(pathFor(build.aioJson || "aiometadata-catalogs.json"), { cache: "no-store" });
    if (aioResponse.ok) aio = await aioResponse.json();

    const stats = statsFrom(nuvio, aio);
    document.title = `${text(build.title, "Build Details")} | Media Tiles`;

    app.innerHTML = `
      <section class="hero">
        <h1>${text(build.title, "Untitled Build")}</h1>
        <p>${text(build.description, "No description provided.")}</p>
      </section>

      ${renderStats(stats)}

      <div class="layout">
        <div>
          ${renderModules(nuvio)}
          ${renderCatalogPreview(nuvio)}
          ${renderNotes(build)}
        </div>

        ${renderDownloads(build)}
      </div>
    `;
  } catch (error) {
    console.error(error);
    app.innerHTML = `
      <div class="error">
        Could not load this build. Check that the folder exists at <strong>builds/${slug}/</strong> and contains <strong>build.json</strong>, <strong>nuvio-collections.json</strong>, and <strong>aiometadata-catalogs.json</strong>.
      </div>
    `;
  }
}

load();
</script>

</body>
</html>
